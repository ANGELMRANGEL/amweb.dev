<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Sun Rays (Vibrant Red/Orange/Yellow multi-layered pattern) -->
  <!-- Main cardinal rays -->
  <rect x="15" y="0" width="2" height="4" fill="#ff3d00" />
  <rect x="15" y="28" width="2" height="4" fill="#ff3d00" />
  <rect x="0" y="15" width="4" height="2" fill="#ff3d00" />
  <rect x="28" y="15" width="4" height="2" fill="#ff3d00" />
  
  <rect x="14" y="2" width="4" height="2" fill="#ff9100" />
  <rect x="14" y="28" width="4" height="2" fill="#ff9100" />
  <rect x="2" y="14" width="2" height="4" fill="#ff9100" />
  <rect x="28" y="14" width="2" height="4" fill="#ff9100" />

  <!-- Diagonal rays -->
  <rect x="4" y="4" width="3" height="3" fill="#ff3d00" />
  <rect x="25" y="4" width="3" height="3" fill="#ff3d00" />
  <rect x="4" y="25" width="3" height="3" fill="#ff3d00" />
  <rect x="25" y="25" width="3" height="3" fill="#ff3d00" />

  <rect x="5" y="5" width="2" height="2" fill="#ff9100" />
  <rect x="25" y="5" width="2" height="2" fill="#ff9100" />
  <rect x="5" y="25" width="2" height="2" fill="#ff9100" />
  <rect x="25" y="25" width="2" height="2" fill="#ff9100" />

  <!-- Sun Body -->
  <rect x="8" y="8" width="16" height="16" fill="#ffcc00" />
  <rect x="10" y="6" width="12" height="20" fill="#ffcc00" />
  <rect x="6" y="10" width="20" height="12" fill="#ffcc00" />
  <rect x="7" y="7" width="18" height="18" fill="#ffcc00" />

  <!-- Inner glowing layers (Orange outline) -->
  <rect x="10" y="10" width="12" height="12" fill="#ff9100" />
  <rect x="11" y="11" width="10" height="10" fill="#ffcc00" />
  <rect x="12" y="12" width="8" height="8" fill="#ffffff" opacity="0.6" />
</svg>
