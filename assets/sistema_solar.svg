<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Sun in Center (Glowing Yellow/Orange core) -->
  <rect x="14" y="14" width="4" height="4" fill="#ffcc00" />
  <rect x="13" y="15" width="6" height="2" fill="#ff9100" />
  <rect x="15" y="13" width="2" height="6" fill="#ff9100" />

  <!-- Orbit 1 (Mercury/Venus - Inner dotted circle) -->
  <rect x="10" y="10" width="12" height="1" fill="#888888" opacity="0.3" />
  <rect x="10" y="21" width="12" height="1" fill="#888888" opacity="0.3" />
  <rect x="10" y="11" width="1" height="10" fill="#888888" opacity="0.3" />
  <rect x="21" y="11" width="1" height="10" fill="#888888" opacity="0.3" />
  <!-- Planet 1 (Mercury: Pink dot) -->
  <rect x="21" y="14" width="2" height="2" fill="#ff4081" />

  <!-- Orbit 2 (Earth/Mars - Medium circle) -->
  <rect x="7" y="7" width="18" height="1" fill="#888888" opacity="0.3" />
  <rect x="7" y="24" width="18" height="1" fill="#888888" opacity="0.3" />
  <rect x="7" y="8" width="1" height="16" fill="#888888" opacity="0.3" />
  <rect x="24" y="8" width="1" height="16" fill="#888888" opacity="0.3" />
  <!-- Planet 2 (Earth: Blue dot with green land pixel) -->
  <rect x="7" y="15" width="2" height="2" fill="#00e5ff" />
  <rect x="7" y="15" width="1" height="1" fill="#00e676" />
  <!-- Planet 3 (Mars: Small red dot) -->
  <rect x="20" y="7" width="1" height="1" fill="#ff3d00" />

  <!-- Orbit 3 (Jupiter - Large outer circle) -->
  <rect x="3" y="3" width="26" height="1" fill="#888888" opacity="0.2" />
  <rect x="3" y="28" width="26" height="1" fill="#888888" opacity="0.2" />
  <rect x="3" y="4" width="1" height="24" fill="#888888" opacity="0.2" />
  <rect x="28" y="4" width="1" height="24" fill="#888888" opacity="0.2" />
  <!-- Planet 4 (Jupiter: Large banded orange ball) -->
  <rect x="3" y="20" width="3" height="3" fill="#ff9100" />
  <rect x="4" y="21" width="1" height="1" fill="#ffea00" />
</svg>
