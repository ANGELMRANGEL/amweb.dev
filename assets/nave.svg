<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Spaceship structure -->
  <!-- Nose cone -->
  <rect x="15" y="2" width="2" height="2" fill="#2979ff" />
  <rect x="14" y="4" width="4" height="2" fill="#1d2a6b" />

  <!-- Visor Cockpit -->
  <rect x="14" y="6" width="4" height="3" fill="#111111" />
  <rect x="15" y="6" width="2" height="2" fill="#00e5ff" />
  <rect x="16" y="6" width="1" height="1" fill="#ffffff" />

  <!-- Main Body -->
  <rect x="13" y="8" width="6" height="14" fill="#ffffff" />
  <rect x="12" y="10" width="8" height="10" fill="#ffffff" />
  <!-- Shading -->
  <rect x="12" y="8" width="1" height="12" fill="#e0e0e0" />
  <rect x="19" y="8" width="1" height="12" fill="#cfd8dc" />

  <!-- Left Wing -->
  <rect x="7" y="14" width="5" height="8" fill="#1d2a6b" />
  <rect x="8" y="16" width="4" height="6" fill="#2979ff" />
  <rect x="4" y="18" width="4" height="4" fill="#1d2a6b" />
  <rect x="5" y="19" width="3" height="3" fill="#2979ff" />
  <!-- Wingtip lights -->
  <rect x="3" y="20" width="1" height="2" fill="#ff1744" />

  <!-- Right Wing -->
  <rect x="20" y="14" width="5" height="8" fill="#1d2a6b" />
  <rect x="20" y="16" width="4" height="6" fill="#2979ff" />
  <rect x="24" y="18" width="4" height="4" fill="#1d2a6b" />
  <rect x="24" y="19" width="3" height="3" fill="#2979ff" />
  <!-- Wingtip lights -->
  <rect x="28" y="20" width="1" height="2" fill="#ff1744" />

  <!-- Center Thruster -->
  <rect x="14" y="22" width="4" height="2" fill="#424242" />
  <rect x="15" y="24" width="2" height="1" fill="#ff4500" />
  <!-- Jet flame -->
  <rect x="15" y="25" width="2" height="4" fill="#ff3d00" />
  <rect x="14" y="26" width="4" height="2" fill="#ff9100" />
  <rect x="15" y="27" width="2" height="2" fill="#ffea00" />
</svg>
