<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Glowing Glass Bubble Dome (Vibrant Green) -->
  <rect x="12" y="3" width="8" height="6" fill="#00ff66" />
  <rect x="10" y="4" width="12" height="5" fill="#00ff66" />
  <rect x="13" y="4" width="2" height="1" fill="#ffffff" /> <!-- Glare -->
  <rect x="11" y="5" width="10" height="4" fill="#00e676" />

  <!-- Alien Pilot silhouette inside dome (Dark/Shadowy) -->
  <rect x="15" y="5" width="2" height="2" fill="#1d2a6b" />
  <rect x="14" y="7" width="4" height="2" fill="#1d2a6b" />

  <!-- Saucer Body (Metallic Silver / Blue details) -->
  <rect x="6" y="9" width="20" height="6" fill="#cfd8dc" />
  <rect x="4" y="10" width="24" height="4" fill="#cfd8dc" />
  <rect x="2" y="11" width="28" height="2" fill="#b0bec5" />
  <rect x="1" y="12" width="30" height="1" fill="#90a4ae" />
  <rect x="0" y="12" width="32" height="0.5" fill="#37474f" />

  <!-- Glowing Yellow/Orange Lights around rim -->
  <rect x="3" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="7" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="11" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="15" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="19" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="23" y="11" width="2" height="1" fill="#ffea00" />
  <rect x="27" y="11" width="2" height="1" fill="#ffea00" />

  <!-- Underbelly center beam emitter -->
  <rect x="12" y="15" width="8" height="1" fill="#ff1744" />

  <!-- Tractor Beam (Semi-transparent cyan light cone) -->
  <polygon points="12,16 20,16 28,32 4,32" fill="#00ffff" opacity="0.25" />
  <polygon points="14,16 18,16 24,32 8,32" fill="#ffffff" opacity="0.15" />
</svg>
