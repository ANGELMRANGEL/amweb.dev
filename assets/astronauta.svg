<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Helmet -->
  <rect x="10" y="3" width="12" height="10" fill="#ffffff" />
  <rect x="9" y="4" width="14" height="8" fill="#ffffff" />
  <!-- Shading -->
  <rect x="9" y="4" width="2" height="8" fill="#e0e0e0" />
  <rect x="21" y="4" width="2" height="8" fill="#cfd8dc" />

  <!-- Visor (Glass) -->
  <rect x="11" y="5" width="10" height="5" fill="#111111" />
  <rect x="12" y="5" width="8" height="4" fill="#1a237e" />
  <rect x="13" y="5" width="6" height="3" fill="#00e5ff" />
  <rect x="14" y="5" width="2" height="1" fill="#ffffff" /> <!-- Reflection -->

  <!-- Collar -->
  <rect x="11" y="12" width="10" height="2" fill="#b0bec5" />

  <!-- Suit Body -->
  <rect x="9" y="14" width="14" height="10" fill="#ffffff" />
  <rect x="9" y="14" width="2" height="10" fill="#e0e0e0" />
  <rect x="21" y="14" width="2" height="10" fill="#cfd8dc" />

  <!-- Life Support Chest Unit -->
  <rect x="12" y="15" width="8" height="5" fill="#eeeeee" stroke="#b0bec5" stroke-width="1" />
  <rect x="13" y="16" width="2" height="1" fill="#ff1744" />
  <rect x="16" y="16" width="2" height="1" fill="#2979ff" />
  <rect x="13" y="18" width="6" height="1" fill="#37474f" />

  <!-- Arms -->
  <rect x="6" y="14" width="3" height="9" fill="#ffffff" />
  <rect x="23" y="14" width="3" height="9" fill="#ffffff" />
  <!-- Gray joints -->
  <rect x="6" y="17" width="3" height="1" fill="#cfd8dc" />
  <rect x="23" y="17" width="3" height="1" fill="#cfd8dc" />
  <!-- Gloves -->
  <rect x="5" y="22" width="3" height="2" fill="#37474f" />
  <rect x="24" y="22" width="3" height="2" fill="#37474f" />

  <!-- Backpack (Space support pack) -->
  <rect x="5" y="12" width="2" height="10" fill="#b0bec5" />
  <rect x="4" y="14" width="1" height="6" fill="#78909c" />

  <!-- Legs -->
  <rect x="9" y="24" width="5" height="6" fill="#ffffff" />
  <rect x="18" y="24" width="5" height="6" fill="#ffffff" />
  <rect x="9" y="24" width="1" height="6" fill="#e0e0e0" />
  <rect x="22" y="24" width="1" height="6" fill="#cfd8dc" />
  <!-- Knee pads -->
  <rect x="10" y="26" width="3" height="1" fill="#b0bec5" />
  <rect x="19" y="26" width="3" height="1" fill="#b0bec5" />

  <!-- Boots -->
  <rect x="8" y="30" width="6" height="2" fill="#37474f" />
  <rect x="18" y="30" width="6" height="2" fill="#37474f" />
</svg>
