<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Comet Head (Glowing circular blue/cyan core) -->
  <rect x="4" y="4" width="6" height="6" fill="#ffffff" />
  <rect x="5" y="3" width="4" height="8" fill="#ffffff" />
  <rect x="3" y="5" width="8" height="4" fill="#ffffff" />
  
  <rect x="5" y="5" width="4" height="4" fill="#00ffff" />
  <rect x="6" y="6" width="2" height="2" fill="#1d2a6b" />

  <!-- Shading on head -->
  <rect x="3" y="6" width="1" height="2" fill="#e0e0e0" />
  <rect x="6" y="3" width="2" height="1" fill="#e0e0e0" />

  <!-- Comet Tail (Massive layered particles) -->
  <!-- Inner hot tail -->
  <rect x="10" y="5" width="12" height="4" fill="#00e5ff" opacity="0.8" />
  <rect x="11" y="6" width="16" height="2" fill="#2979ff" />
  <rect x="9" y="4" width="8" height="1" fill="#00ffff" />
  <rect x="9" y="9" width="8" height="1" fill="#00ffff" />

  <!-- Outer vapor tail -->
  <rect x="12" y="3" width="12" height="1" fill="#2979ff" opacity="0.4" />
  <rect x="12" y="10" width="12" height="1" fill="#2979ff" opacity="0.4" />
  <rect x="16" y="2" width="14" height="1" fill="#1d2a6b" opacity="0.2" />
  <rect x="16" y="11" width="14" height="1" fill="#1d2a6b" opacity="0.2" />
  <rect x="20" y="5" width="12" height="4" fill="#1d2a6b" opacity="0.3" />
</svg>
