<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Antenna -->
  <rect x="15" y="1" width="2" height="4" fill="#888888" />
  <rect x="14" y="0" width="4" height="2" fill="#ff3d00" />
  <circle cx="16" cy="1" r="2" fill="#ffeb3b" opacity="0.8" />

  <!-- Head -->
  <rect x="9" y="5" width="14" height="9" fill="#a0a0a0" />
  <rect x="8" y="6" width="16" height="7" fill="#b0b0b0" />
  <!-- Shading -->
  <rect x="8" y="5" width="2" height="9" fill="#78909c" />
  <!-- Earbolts -->
  <rect x="7" y="8" width="1" height="3" fill="#546e7a" />
  <rect x="24" y="8" width="1" height="3" fill="#546e7a" />

  <!-- Eyes (Glowing Cyan with white core) -->
  <rect x="11" y="7" width="3" height="3" fill="#00e5ff" />
  <rect x="18" y="7" width="3" height="3" fill="#00e5ff" />
  <rect x="11" y="7" width="1" height="1" fill="#ffffff" />
  <rect x="18" y="7" width="1" height="1" fill="#ffffff" />

  <!-- Mouth (LED strip) -->
  <rect x="12" y="11" width="8" height="1" fill="#1a237e" />
  <rect x="13" y="11" width="6" height="1" fill="#2979ff" />

  <!-- Neck -->
  <rect x="14" y="14" width="4" height="2" fill="#78909c" />

  <!-- Body -->
  <rect x="7" y="16" width="18" height="10" fill="#a0a0a0" />
  <rect x="8" y="17" width="16" height="8" fill="#b0b0b0" />
  <!-- Shading -->
  <rect x="7" y="16" width="2" height="10" fill="#78909c" />

  <!-- Chest Matrix Display -->
  <rect x="10" y="18" width="12" height="4" fill="#212121" />
  <!-- Sine wave/blinking lights -->
  <rect x="11" y="20" width="2" height="1" fill="#00ff66" />
  <rect x="14" y="19" width="2" height="1" fill="#00ff66" />
  <rect x="17" y="20" width="2" height="1" fill="#00ff66" />
  <rect x="20" y="19" width="1" height="2" fill="#ff1744" />

  <!-- Arms -->
  <rect x="3" y="17" width="4" height="2" fill="#78909c" />
  <rect x="25" y="17" width="4" height="2" fill="#78909c" />
  <rect x="3" y="19" width="2" height="7" fill="#a0a0a0" />
  <rect x="27" y="19" width="2" height="7" fill="#a0a0a0" />
  <!-- Claws -->
  <rect x="2" y="26" width="3" height="1" fill="#546e7a" />
  <rect x="27" y="26" width="3" height="1" fill="#546e7a" />

  <!-- Legs -->
  <rect x="10" y="26" width="3" height="4" fill="#78909c" />
  <rect x="19" y="26" width="3" height="4" fill="#78909c" />
  <rect x="8" y="30" width="6" height="2" fill="#455a64" />
  <rect x="18" y="30" width="6" height="2" fill="#455a64" />
</svg>
