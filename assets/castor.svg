<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Ears -->
  <rect x="7" y="2" width="4" height="4" fill="#6d4c41" />
  <rect x="21" y="2" width="4" height="4" fill="#6d4c41" />
  <rect x="8" y="3" width="2" height="2" fill="#ffab91" />
  <rect x="22" y="3" width="2" height="2" fill="#ffab91" />

  <!-- Head (Main shape) -->
  <rect x="7" y="6" width="18" height="12" fill="#8d6e63" />
  <rect x="9" y="5" width="14" height="14" fill="#8d6e63" />
  <!-- Shading on left -->
  <rect x="7" y="6" width="2" height="12" fill="#5d4037" />
  <rect x="9" y="5" width="1" height="14" fill="#5d4037" />

  <!-- Visor Eyes / Big cute eyes -->
  <rect x="10" y="8" width="4" height="4" fill="#ffffff" />
  <rect x="18" y="8" width="4" height="4" fill="#ffffff" />
  <rect x="10" y="9" width="3" height="3" fill="#000000" />
  <rect x="19" y="9" width="3" height="3" fill="#000000" />
  <rect x="10" y="9" width="1" height="1" fill="#ffffff" />
  <rect x="19" y="9" width="1" height="1" fill="#ffffff" />

  <!-- Cheek Blush -->
  <rect x="8" y="12" width="2" height="2" fill="#ff8a80" opacity="0.6" />
  <rect x="22" y="12" width="2" height="2" fill="#ff8a80" opacity="0.6" />

  <!-- Snout -->
  <rect x="13" y="12" width="6" height="4" fill="#ffcc80" />
  <rect x="15" y="11" width="2" height="2" fill="#212121" /> <!-- Nose -->

  <!-- Teeth -->
  <rect x="14" y="16" width="2" height="2" fill="#ffffff" />
  <rect x="16" y="16" width="2" height="2" fill="#ffffff" />
  <!-- Teeth separator line -->
  <rect x="16" y="16" width="0.5" height="2" fill="#000000" opacity="0.2" />

  <!-- Body -->
  <rect x="6" y="19" width="20" height="10" fill="#8d6e63" />
  <rect x="8" y="18" width="16" height="12" fill="#8d6e63" />
  <!-- Underbelly patch -->
  <rect x="12" y="20" width="8" height="8" fill="#ffe0b2" />
  <!-- Shading on left body -->
  <rect x="6" y="19" width="2" height="10" fill="#5d4037" />

  <!-- Arms -->
  <rect x="4" y="20" width="2" height="6" fill="#6d4c41" />
  <rect x="26" y="20" width="2" height="6" fill="#6d4c41" />

  <!-- Tail (Detailed grid) -->
  <rect x="25" y="24" width="6" height="6" fill="#4e342e" />
  <rect x="26" y="25" width="4" height="4" fill="#3e2723" />

  <!-- Feet -->
  <rect x="8" y="30" width="4" height="2" fill="#4e342e" />
  <rect x="20" y="30" width="4" height="2" fill="#4e342e" />
</svg>
