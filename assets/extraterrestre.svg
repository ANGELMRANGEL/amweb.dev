<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Alien Body (Detailed Green #00ff66 and deep green shadows) -->
  <!-- Antennas -->
  <rect x="8" y="2" width="2" height="4" fill="#00ff66" />
  <rect x="22" y="2" width="2" height="4" fill="#00ff66" />
  <rect x="7" y="1" width="4" height="1" fill="#00ff66" />
  <rect x="21" y="1" width="4" height="1" fill="#00ff66" />

  <!-- Head -->
  <rect x="9" y="6" width="14" height="10" fill="#00ff66" />
  <rect x="8" y="8" width="16" height="7" fill="#00ff66" />
  <!-- Shading on left -->
  <rect x="8" y="6" width="2" height="10" fill="#00cc44" opacity="0.5" />
  
  <!-- Big Alien Eyes (Glow & Pupils) -->
  <rect x="11" y="9" width="4" height="4" fill="#ffffff" />
  <rect x="17" y="9" width="4" height="4" fill="#ffffff" />
  <rect x="12" y="10" width="2" height="2" fill="#000000" />
  <rect x="18" y="10" width="2" height="2" fill="#000000" />
  <rect x="14" y="9" width="1" height="1" fill="#00ffff" />
  <rect x="20" y="9" width="1" height="1" fill="#00ffff" />

  <!-- Mouth (Pixelated grin) -->
  <rect x="13" y="14" width="6" height="1" fill="#00cc44" />
  <rect x="12" y="13" width="1" height="1" fill="#00cc44" />
  <rect x="19" y="13" width="1" height="1" fill="#00cc44" />

  <!-- Body -->
  <rect x="8" y="16" width="16" height="10" fill="#00ff66" />
  <rect x="6" y="18" width="20" height="6" fill="#00ff66" />
  <!-- Underbelly details -->
  <rect x="11" y="18" width="10" height="4" fill="#ffffff" opacity="0.3" />

  <!-- Tentacles/Arms -->
  <rect x="4" y="16" width="2" height="8" fill="#00ff66" />
  <rect x="26" y="16" width="2" height="8" fill="#00ff66" />
  <rect x="3" y="22" width="2" height="3" fill="#00cc44" />
  <rect x="27" y="22" width="2" height="3" fill="#00cc44" />

  <!-- Legs -->
  <rect x="8" y="26" width="4" height="4" fill="#00ff66" />
  <rect x="20" y="26" width="4" height="4" fill="#00ff66" />
  <!-- Feet -->
  <rect x="6" y="29" width="6" height="2" fill="#00cc44" />
  <rect x="20" y="29" width="6" height="2" fill="#00cc44" />
</svg>
