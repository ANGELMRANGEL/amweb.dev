<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- Planet Core (Vibrant orange/red planet body) -->
  <rect x="10" y="8" width="12" height="16" fill="#ff5722" />
  <rect x="8" y="10" width="16" height="12" fill="#ff5722" />
  <rect x="9" y="9" width="14" height="14" fill="#ff5722" />

  <!-- Shading on left -->
  <rect x="8" y="10" width="2" height="12" fill="#d84315" />
  <rect x="9" y="9" width="1" height="14" fill="#d84315" />

  <!-- Atmospheric Bands (Yellow/Gold stripes) -->
  <rect x="8" y="12" width="16" height="2" fill="#ffcc00" />
  <rect x="7" y="14" width="18" height="1" fill="#ffe082" />
  <rect x="8" y="18" width="16" height="2" fill="#ffb74d" />

  <!-- Outer Planetary Ring (Cyan/Blue double layer, overlapping planet) -->
  <!-- Left ring wing (back of planet) -->
  <rect x="1" y="18" width="8" height="2" fill="#00e5ff" />
  <rect x="3" y="17" width="6" height="1" fill="#2979ff" />
  <!-- Right ring wing (back of planet) -->
  <rect x="23" y="12" width="8" height="2" fill="#00e5ff" />
  <rect x="23" y="14" width="6" height="1" fill="#2979ff" />

  <!-- Ring overlapping front of planet (descending diagonal) -->
  <rect x="8" y="16" width="16" height="2" fill="#00ffff" opacity="0.9" />
  <rect x="6" y="17" width="4" height="1" fill="#ffffff" />
  <rect x="22" y="14" width="4" height="1" fill="#ffffff" />
</svg>
