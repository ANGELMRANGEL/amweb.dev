<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>Sketchboard Pro - iPad Mini 1</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>Sketchboard Pro - iPad Mini 1 (Safari 9 compatible)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <!-- Inline SVGs for compatibility -->
    <!-- Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
</head>

<body class="dark-theme">
    <div id="app-container">
        <!-- Main Canvas Area -->
        <main id="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
        </main>

        <!-- Unified Compact Toolbar (Native SVGs) -->
        <nav id="bottom-toolbar">
            <div class="tool-group">
                <button id="tool-pencil" class="tool-btn active" title="Lápiz">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M19.405 2.598c.316.253.595.636.595 1.152c0 .784-.5 1.296-1.068 1.594c-.545.285-1.258.442-2.01.537c-1.45.184-3.345.168-5.185.153l-.243-.002c-1.956-.016-3.829-.021-5.212.183c-.698.103-1.19.25-1.49.423c-.268.156-.292.27-.292.361l.001.002a.3.3 0 0 0 .075.083c.11.097.314.213.636.327c.638.226 1.534.376 2.486.468q.15.015.302.027v1.505a25 25 0 0 1-.447-.039c-.986-.095-2.028-.258-2.843-.547c-.405-.144-.807-.337-1.12-.61c-.325-.283-.59-.69-.59-1.214c0-.784.462-1.326 1.04-1.66c.548-.318 1.266-.498 2.022-.61c1.523-.225 3.525-.215 5.444-.2l.182.002c1.893.016 3.698.03 5.046-.14c.702-.089 1.2-.22 1.502-.378c.194-.102.246-.176.26-.222l-.028-.024c-.098-.078-.287-.178-.598-.276c-.615-.196-1.49-.324-2.46-.4c-1.595-.127-3.288-.107-4.198-.096L10.75 3a.75.75 0 0 1 0-1.5l.418-.004c.894-.011 2.685-.033 4.36.1c1 .08 2.014.217 2.797.466c.389.124.776.292 1.08.535m-5.41 6.731C13.928 7.968 13.098 7 11.749 7C10.342 7 9.5 8.056 9.5 9.509v4.168l-.259-.08c-1.191-.348-2.124-.367-2.826-.016c-.953.476-1.444 1.332-1.419 2.44a.75.75 0 0 0 .416.655l2.363 1.176l.097.052l.094.058l1.884 1.256l.193.139c.44.338.792.778 1.027 1.283l.029.062l.079.155a2.25 2.25 0 0 0 2.28 1.124l2.419-.347l.165-.03a2.25 2.25 0 0 0 1.689-1.617l1.048-3.923l.042-.18a3.25 3.25 0 0 0-2.601-3.857L14 11.625V9.509zm-2.992.038c.034-.592.286-.866.746-.866c.496 0 .75.318.75 1.008v2.742l.008.107a.75.75 0 0 0 .608.63l2.905.53l.07.016a1.75 1.75 0 0 1 1.239 2.143L16.28 19.6l-.036.105a.75.75 0 0 1-.582.444l-2.418.347l-.108.008a.75.75 0 0 1-.678-.434l-.03-.063l-.121-.244a4.96 4.96 0 0 0-1.626-1.793l-1.884-1.256l-.174-.108l-.181-.097l-1.905-.948l.038-.12c.09-.228.256-.392.51-.519c.437-.218 1.418-.078 2.879.524a.75.75 0 0 0 1.035-.693V9.51z" />
                    </svg>
                </button>
                <button id="tool-line" class="tool-btn" title="Línea">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M21.784 2.22a.75.75 0 0 1 0 1.06L3.28 21.784a.75.75 0 1 1-1.06-1.06L20.723 2.22a.75.75 0 0 1 1.06 0" />
                    </svg>
                </button>
                <button id="tool-arrow" class="tool-btn" title="Flecha">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M10.75 3a.75.75 0 0 0 0 1.5h7.67L3.22 19.7a.764.764 0 1 0 1.081 1.081l15.2-15.2v7.669a.75.75 0 0 0 1.5 0v-9.5a.75.75 0 0 0-.75-.75z" />
                    </svg>
                </button>
                <button id="tool-rect" class="tool-btn" title="Rectángulo">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M3 6.25A3.25 3.25 0 0 1 6.25 3h11.5A3.25 3.25 0 0 1 21 6.25v11.5A3.25 3.25 0 0 1 17.75 21H6.25A3.25 3.25 0 0 1 3 17.75zM6.25 4.5A1.75 1.75 0 0 0 4.5 6.25v11.5c0 .966.784 1.75 1.75 1.75h11.5a1.75 1.75 0 0 0 1.75-1.75V6.25a1.75 1.75 0 0 0-1.75-1.75z" />
                    </svg>
                </button>
                <button id="tool-circle" class="tool-btn" title="Círculo">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M12 3.5a8.5 8.5 0 1 0 0 17a8.5 8.5 0 0 0 0-17M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12" />
                    </svg>
                </button>
                <button id="tool-eraser" class="tool-btn" title="Borrador">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M12.43 2.308a3.75 3.75 0 0 1 5.304 0l3.958 3.958a3.75 3.75 0 0 1 0 5.304l-8.23 8.23a3.75 3.75 0 0 1-2.651 1.099h-6.06a.75.75 0 0 1-.75-.75v-6.06a3.75 3.75 0 0 1 1.1-2.651zm4.243 1.06a2.25 2.25 0 0 0-3.182 0L8.796 8.064l7.14 7.14l4.695-4.695a2.25 2.25 0 0 0 0-3.182zM14.875 16.265l-7.141-7.14l-2.639 2.638a2.25 2.25 0 0 0-.66 1.591v5.394h5.394c.597 0 1.17-.237 1.591-.661zM2.22 21.03l19.563-.03a.75.75 0 1 1 .002 1.5l-19.563.03a.75.75 0 1 1-.002-1.5" />
                    </svg>
                </button>
            </div>

            <div class="separator-v"></div>

            <div class="palette-container">
                <div class="color-swatch active" style="background-color: #FFFFFF;" data-color="#FFFFFF"></div>
                <div class="color-swatch" style="background-color: #000000;" data-color="#000000"></div>
                <div class="color-swatch" style="background-color: #FF3B30;" data-color="#FF3B30"></div>
                <div class="color-swatch" style="background-color: #007AFF;" data-color="#007AFF"></div>
                <div class="color-swatch" style="background-color: #4CD964;" data-color="#4CD964"></div>
                <div class="color-swatch" style="background-color: #FFCC00;" data-color="#FFCC00"></div>
            </div>

            <div class="separator-v"></div>

            <div class="history-controls">
                <button id="btn-save" class="action-btn" title="Guardar">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M3 5.75A2.75 2.75 0 0 1 5.75 3h9.965a3.25 3.25 0 0 1 2.298.952l2.035 2.035c.61.61.952 1.437.952 2.299v9.964A2.75 2.75 0 0 1 18.25 21H5.75A2.75 2.75 0 0 1 3 18.25zM5.75 4.5c-.69 0-1.25.56-1.25 1.25v12.5c0 .69.56 1.25 1.25 1.25H6v-5.25A2.25 2.25 0 0 1 8.25 12h7.5A2.25 2.25 0 0 1 18 14.25v5.25h.25c.69 0 1.25-.56 1.25-1.25V8.286c0-.465-.184-.91-.513-1.238l-2.035-2.035a1.75 1.75 0 0 0-.952-.49V7.25a2.25 2.25 0 0 1-2.25 2.25h-4.5A2.25 2.25 0 0 1 7 7.25V4.5zm10.75 15v-5.25a.75.75 0 0 0-.75-.75h-7.5a.75.75 0 0 0-.75.75v5.25zm-8-15v2.75c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75V4.5z" />
                    </svg>
                </button>
                <button id="btn-gallery" class="action-btn" title="Galería">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M3.5 6.25V8h4.629a.75.75 0 0 0 .53-.22l1.53-1.53l-1.53-1.53a.75.75 0 0 0-.53-.22H5.25A1.75 1.75 0 0 0 3.5 6.25m-1.5 0A3.25 3.25 0 0 1 5.25 3h2.879a2.25 2.25 0 0 1 1.59.659L11.562 5.5h7.189A3.25 3.25 0 0 1 22 8.75v9A3.25 3.25 0 0 1 18.75 21H5.25A3.25 3.25 0 0 1 2 17.75zM3.5 9.5v8.25c0 .966.784 1.75 1.75 1.75h13.5a1.75 1.75 0 0 0 1.75-1.75v-9A1.75 1.75 0 0 0 18.75 7h-7.19L9.72 8.841a2.25 2.25 0 0 1-1.591.659z" />
                    </svg>
                </button>
                <div class="separator-v"></div>
                <button id="btn-undo" class="action-btn" title="Deshacer">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M4.75 2a.75.75 0 0 1 .743.648l.007.102v5.69l4.574-4.56a6.41 6.41 0 0 1 8.879-.179l.186.18a6.41 6.41 0 0 1 0 9.063l-8.846 8.84a.75.75 0 0 1-1.06-1.062l8.845-8.838a4.91 4.91 0 0 0-6.766-7.112l-.178.17L6.562 9.5h5.688a.75.75 0 0 1 .743.648l.007.102a.75.75 0 0 1-.648.743L12.25 11h-7.5a.75.75 0 0 1-.743-.648L4 10.25v-7.5A.75.75 0 0 1 4.75 2" />
                    </svg>
                </button>
                <button id="btn-redo" class="action-btn" title="Rehacer">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M19.25 2a.75.75 0 0 0-.743.648l-.007.102v5.69l-4.574-4.56a6.41 6.41 0 0 0-8.878-.179l-.186.18a6.41 6.41 0 0 0 0 9.063l8.845 8.84a.75.75 0 0 0 1.06-1.062l-8.845-8.838a4.91 4.91 0 0 1 6.766-7.112l.178.17L17.438 9.5H11.75a.75.75 0 0 0-.743.648L11 10.25c0 .38.282.694.648.743l.102.007h7.5a.75.75 0 0 0 .743-.648L20 10.25v-7.5a.75.75 0 0 0-.75-.75" />
                    </svg>
                </button>
                <button id="btn-clear" class="action-btn danger" title="Borrar">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path
                            d="M10 5h4a2 2 0 1 0-4 0M8.5 5a3.5 3.5 0 1 1 7 0h5.75a.75.75 0 0 1 0 1.5h-1.32l-1.17 12.111A3.75 3.75 0 0 1 15.026 22H8.974a3.75 3.75 0 0 1-3.733-3.389L4.07 6.5H2.75a.75.75 0 0 1 0-1.5zM10 9.75a.75.75 0 0 0-1.5 0v7.5a.75.75 0 0 0 1.5 0zm4.25 0a.75.75 0 0 1 .75.75v7.5a.75.75 0 0 1-1.5 0v-7.5a.75.75 0 0 1 .75-.75m-7.516 9.467a2.25 2.25 0 0 0 2.24 2.033h6.052a2.25 2.25 0 0 0 2.24-2.033L18.424 6.5H5.576z" />
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Gallery Overlay -->
        <div id="gallery-overlay" class="hidden">
            <div class="gallery-content">
                <header class="gallery-header">
                    <h2>Diseños Guardados</h2>
                    <button id="btn-close-gallery" class="close-btn">
                        <svg class="icon-svg" viewBox="0 0 24 24">
                            <path
                                d="m4.397 4.554l.073-.084a.75.75 0 0 1 .976-.073l.084.073L12 10.939l6.47-6.47a.75.75 0 1 1 1.06 1.061L13.061 12l6.47 6.47a.75.75 0 0 1 .072.976l-.073.084a.75.75 0 0 1-.976.073l-.084-.073L12 13.061l-6.47 6.47a.75.75 0 0 1-1.06-1.061L10.939 12l-6.47-6.47a.75.75 0 0 1-.072-.976l.073-.084z" />
                        </svg>
                    </button>
                </header>
                <div id="gallery-list" class="gallery-grid"></div>
            </div>
        </div>
    </div>

    <!-- Application Script (ES5) -->
    <script src="app.js"></script>
</body>

</html>
